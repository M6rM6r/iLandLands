name: Marketing Site CI/CD

on:
  push:
    branches: [ main, develop ]
    paths: [ 'marketing-site/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'marketing-site/**' ]

jobs:
  lighthouse-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install -g lighthouse
      - run: lighthouse http://localhost:8000 --output=json --output-path=./lighthouse-results.json || true
        working-directory: marketing-site
      - uses: actions/upload-artifact@v3
        with:
          name: lighthouse-report
          path: ./marketing-site/lighthouse-results.json

  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: echo "Site built successfully" # Add build steps if needed