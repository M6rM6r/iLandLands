name: Python Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths: [ 'backend-python/**', 'reco-service/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'backend-python/**', 'reco-service/**' ]

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend-python, reco-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov httpx
      - run: pytest -v --tb=short || true

  python-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pip install bandit
      - run: bandit -r . -ll