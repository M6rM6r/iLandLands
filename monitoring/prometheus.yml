global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: '${ENVIRONMENT:-development}'
    project: 'gulflands'

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'nginx'
    static_configs:
      - targets: ['app:9113']
    metrics_path: /metrics

  - job_name: 'php-fpm'
    static_configs:
      - targets: ['app:9253']

  - job_name: 'analytics'
    static_configs:
      - targets: ['analytics:8000']
    metrics_path: /metrics

  - job_name: 'reco-service'
    static_configs:
      - targets: ['reco-service:8001']
    metrics_path: /metrics

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
