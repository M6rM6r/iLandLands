version: '3.8'

services:
  # Database Service
  mysql:
    image: mysql:8.0
    container_name: gulflands_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gulflands}
      MYSQL_USER: ${MYSQL_USER:-gulflands_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secure_password_123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./docker/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - gulflands_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 30s

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: gulflands_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - gulflands_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      timeout: 3s
      retries: 10
      interval: 30s

  # PHP/Nginx Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: gulflands_app
    restart: unless-stopped
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DB_HOST=mysql
      - DB_NAME=${MYSQL_DATABASE:-gulflands}
      - DB_USER=${MYSQL_USER:-gulflands_user}
      - DB_PASSWORD=${MYSQL_PASSWORD:-secure_password_123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password_123}
      - API_BASE_URL=${API_BASE_URL:-http://localhost/api/v1}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      # Telr Payment Gateway (Phase 4)
      - TELR_STORE_ID=${TELR_STORE_ID:-}
      - TELR_AUTH_KEY=${TELR_AUTH_KEY:-}
      - TELR_TEST_MODE=${TELR_TEST_MODE:-1}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:-http://localhost:3000}
      # WhatsApp Cloud API (Phase 5)
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:-}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID:-}
      - WHATSAPP_AGENT_NUMBERS=${WHATSAPP_AGENT_NUMBERS:-}
      - WHATSAPP_TEMPLATE_INQUIRY=${WHATSAPP_TEMPLATE_INQUIRY:-new_inquiry_agent}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET:-}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN:-}
      # HubSpot CRM (Phase 5)
      - HUBSPOT_ACCESS_TOKEN=${HUBSPOT_ACCESS_TOKEN:-}
      # OpenAI (Phase 6)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # PayTabs (Batch 3)
      - PAYTABS_SERVER_KEY=${PAYTABS_SERVER_KEY:-}
      - PAYTABS_PROFILE_ID=${PAYTABS_PROFILE_ID:-}
      - PAYTABS_REGION=${PAYTABS_REGION:-UAE}
      # Webhook queue
      - QUEUE_DIR=${QUEUE_DIR:-/var/data/queues}
      # Image uploads
      - UPLOAD_DIR=${UPLOAD_DIR:-/var/www/html/storage/uploads}
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./logs/nginx:/var/log/nginx
      - ./logs/php:/var/log/php
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gulflands_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      timeout: 10s
      retries: 3
      interval: 30s

  # Analytics Service (Python)
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: gulflands_analytics
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql://${MYSQL_USER:-gulflands_user}:${MYSQL_PASSWORD:-secure_password_123}@mysql:3306/${MYSQL_DATABASE:-gulflands}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password_123}@redis:6379/0
      - LOG_LEVEL=${ANALYTICS_LOG_LEVEL:-INFO}
    volumes:
      - ./analytics/logs:/app/logs
      - ./analytics/config:/app/config:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gulflands_network

  # Monitoring Service (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: gulflands_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - gulflands_network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: gulflands_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_123}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - gulflands_network

  # Log Aggregation (ELK Stack - Elasticsearch)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: gulflands_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - gulflands_network

  # Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:8.8.0
    container_name: gulflands_logstash
    restart: unless-stopped
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logs:/logs:ro
    depends_on:
      - elasticsearch
    networks:
      - gulflands_network

  # Kibana Dashboard
  kibana:
    image: docker.elastic.co/kibana/kibana:8.8.0
    container_name: gulflands_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      - elasticsearch
    networks:
      - gulflands_network

  # Backup Service
  backup:
    image: mysql:8.0
    container_name: gulflands_backup
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gulflands}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: /bin/sh -c "chmod +x /backup.sh && crond -f"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gulflands_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  gulflands_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
