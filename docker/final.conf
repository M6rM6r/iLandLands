server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check
    location = /api/v1/health {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    # API routes (PHP backend)
    location /api/ {
        root /var/www/html/public;
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        root /var/www/html/public;
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=16M \n post_max_size=16M";
        fastcgi_read_timeout 300;
        fastcgi_hide_header X-Powered-By;
    }

    # Flutter Web SPA (served from build output)
    location / {
        root /var/www/html/web;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root /var/www/html/web;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block sensitive files
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ /(vendor|composer\.(json|lock)|package\.json)$ {
        deny all;
        return 404;
    }
}
