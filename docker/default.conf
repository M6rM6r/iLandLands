server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS in production; allow HTTP in dev
    # In production set ENVIRONMENT=production and terminate TLS at load balancer
    root /var/www/html/public;
    index index.php index.html;

    # --- Security headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.gulflands.com; frame-ancestors 'none';" always;

    # --- Health check (no rate limit) ---
    location = /api/v1/health {
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    # --- API routes (PHP) ---
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_conn conn_limit 20;

        try_files $uri /index.php?$query_string;
    }

    location /api/v1/search {
        limit_req zone=api_search burst=5 nodelay;
        try_files $uri /index.php?$query_string;
    }

    location /api/v1/auth/ {
        limit_req zone=api_auth burst=2 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # --- PHP-FPM ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=16M \n post_max_size=16M";
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_hide_header X-Powered-By;
    }

    # --- Flutter Web (SPA) ---
    location / {
        root /var/www/flutter_web;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root /var/www/flutter_web;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block access to sensitive files
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ /(vendor|composer\.(json|lock)|package\.json)$ {
        deny all;
        return 404;
    }
}
