# =============================================================================
# docker-compose.test.yml
# Test environment for CI/CD integration testing.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit
# =============================================================================

version: "3.9"

services:
  # Override app service for testing
  app:
    environment:
      - ENVIRONMENT=test
      - DB_HOST=mysql-test
      - DB_NAME=gulflands_test
      - DB_USER=test_user
      - DB_PASSWORD=test_password
      - REDIS_HOST=redis-test
      - REDIS_PASSWORD=test_redis
      - JWT_SECRET=test_jwt_secret_32chars_minimum_!!
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy

  # Isolated MySQL for tests (in-memory tmpfs for speed)
  mysql-test:
    image: mysql:8.0
    container_name: gulflands_mysql_test
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: root_test_password
      MYSQL_DATABASE: gulflands_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    tmpfs:
      - /var/lib/mysql:size=256m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "test_user", "-ptest_password"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gulflands_network

  # Isolated Redis for tests
  redis-test:
    image: redis:7-alpine
    container_name: gulflands_redis_test
    restart: "no"
    command: redis-server --requirepass test_redis --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gulflands_network

  # Test runner
  test-runner:
    image: php:8.2-cli-alpine
    container_name: gulflands_test_runner
    working_dir: /app
    environment:
      - ENVIRONMENT=test
      - DB_HOST=mysql-test
      - DB_NAME=gulflands_test
      - DB_USER=test_user
      - DB_PASSWORD=test_password
      - REDIS_HOST=redis-test
      - REDIS_PASSWORD=test_redis
      - JWT_SECRET=test_jwt_secret_32chars_minimum_!!
    volumes:
      - .:/app
    command: >
      sh -c "
        cd /app &&
        composer install --no-interaction --prefer-dist --optimize-autoloader &&
        php vendor/bin/phpunit --configuration phpunit.xml --log-junit /app/build/reports/junit.xml
      "
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    networks:
      - gulflands_network
