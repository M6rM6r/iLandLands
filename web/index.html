  <!-- Analytics and Tracking -->
  <script>
    // Global data layer for analytics
    window.dataLayer = window.dataLayer || [];
    window.gtag = function(){dataLayer.push(arguments);}
    gtag('js', new Date());
    
    // Configuration
    window.GULFLANDS_CONFIG = {
      API_BASE_URL: 'https://api.gulflands.com/v1',
      ANALYTICS_ENABLED: true,
      ENVIRONMENT: 'production',
      VERSION: '2.0.0',
      BUILD_NUMBER: '1'
    };
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/flutter_service_worker.js')
          .then(function(registration) {
            console.log('ServiceWorker registration successful');
          })
          .catch(function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>

  <!-- Error Handling -->
  <script>
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.error);
      // Send to analytics service
      if (window.gtag) {
        gtag('event', 'exception', {
          'description': e.error.message,
          'fatal': false
        });
      }
    });

    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled promise rejection:', e.reason);
      // Send to analytics service
      if (window.gtag) {
        gtag('event', 'exception', {
          'description': e.reason,
          'fatal': false
        });
      }
    });
  </script>

  <!-- Performance Monitoring -->
  <script>
    // Track page load performance
    window.addEventListener('load', function() {
      setTimeout(function() {
        const perfData = performance.getEntriesByType('navigation')[0];
        if (perfData && window.gtag) {
          gtag('event', 'page_load_time', {
            'value': Math.round(perfData.loadEventEnd - perfData.loadEventStart),
            'custom_parameter': 'milliseconds'
          });
        }
      }, 0);
    });
  </script>

  <title>Gulf Lands Market - Premium Real Estate Platform</title>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    font-family: 'Inter', sans-serif;
    color: white;
  ">
    <div style="text-align: center;">
      <div style="
        width: 80px;
        height: 80px;
        border: 4px solid rgba(255,255,255,0.1);
        border-top: 4px solid #ffffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      "></div>
      <h1 style="margin: 0; font-size: 24px; font-weight: 600;">Gulf Lands Market</h1>
      <p style="margin: 8px 0 0; opacity: 0.8; font-size: 14px;">Loading premium real estate platform...</p>
    </div>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </div>

  <!-- Main Flutter App -->
  <div id="flutter-app" style="display: none;">
    <script src="analytics-sdk.js"></script>
    <script src="flutter_bootstrap.js" async></script>
  </div>

  <!-- Fallback Content -->
  <noscript>
    <div style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a237e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    ">
      <h1 style="margin: 0; font-size: 24px; font-weight: 600;">JavaScript Required</h1>
      <p style="margin: 16px 0 0; opacity: 0.8; font-size: 16px; max-width: 400px;">
        Gulf Lands Market requires JavaScript to function properly. Please enable JavaScript in your browser settings and reload the page.
      </p>
    </div>
  </noscript>

  <!-- Hide loading screen when Flutter app is ready -->
  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loadingScreen = document.getElementById('loading-screen');
      const flutterApp = document.getElementById('flutter-app');
      
      if (loadingScreen) {
        loadingScreen.style.opacity = '0';
        loadingScreen.style.transition = 'opacity 0.5s ease-out';
        
        setTimeout(function() {
          loadingScreen.style.display = 'none';
        }, 500);
      }
      
      if (flutterApp) {
        flutterApp.style.display = 'block';
      }
    });
  </script>
</body>
